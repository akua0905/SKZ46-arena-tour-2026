name: monitor

on:
  schedule:
    - cron: "*/5 * * * *"

  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"


      - name: Install packages
        run: npm install


      - name: Install browser
        run: npx playwright install chromium


      - name: Run monitor
        run: node monitor.js
        env:
          WEBHOOK: ${{ secrets.WEBHOOK }}
