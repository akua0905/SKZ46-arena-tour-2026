name: monitor

on:

  schedule:

    - cron: "*/5 * * * *"


  workflow_dispatch:


jobs:

  check:

    runs-on: ubuntu-latest


    steps:

    - uses: actions/checkout@v4


    - uses: actions/setup-node@v4

      with:

        node-version:20


    - run:

        npm install


    - run:

        npx playwright install chromium


    - run:

        node monitor.js

      env:

        WEBHOOK:
          ${{ secrets.WEBHOOK }}
